              vaccine researcher and a champion of research training and inclusion of
              underrepresented individuals in the scientific workforce. Dr. Kirschstein was
              the first woman to become director of an NIH institute.
            </p>
            <p>
              The NCI Ruth L. Kirschstein National Research Service Award (NRSA) program
              helps ensure that a diverse pool of highly trained scientists is available in
              appropriate scientific disciplines to meet the nation’s biomedical,
              behavioral, and clinical research needs.
            </p>
            <p>
              <a
                href="/node/65887"
