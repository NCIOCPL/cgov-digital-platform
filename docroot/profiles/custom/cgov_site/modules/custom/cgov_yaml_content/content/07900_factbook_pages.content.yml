## NCI Budget Fact Book
- entity: 'node'
  type: 'cgov_article'
  langcode: en
  status: 1
  moderation_state:
    value: 'published'
  title: 'NCI Budget Fact Book'
  field_browser_title: 'NCI Budget Fact Book'
  field_page_description: 'NCI Budget Fact Book'
  field_card_title: 'NCI Budget Fact Book'
  field_card_description:
    value: 'NCI Budget Fact Book'
  field_site_section:
    - '#process':
        callback: 'reference'
        args:
          - 'taxonomy_term'
          - vid: 'cgov_site_sections'
            computed_path: '/about-nci/budget/fact-book'
  field_public_use:
    value: 0
  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              This report provides a summary of the distribution of the fiscal year 2024 budget among the various NCI research programs and funding mechanisms, funding policies influencing grant awards, as well as comparisons with prior year allocations. Additional information on the NCI budget is accessible from the&nbsp;<a href="/node/13019" data-entity-type="node" data-entity-uuid="8b45edc5-d932-4f0f-a630-6f9b47b6a332" data-entity-substitution="canonical" rel="nofollow noopener" target="_blank">NCI home page</a>.
            </p>
            <h2>
              Fiscal Year 2024 Highlights
            </h2>
            <drupal-entity
              data-align=""
              data-caption=""
              data-embed-button="cgov_infographic_button"
              data-entity-embed-display="view_mode:media.infographic_display_article_large"
              data-entity-type="media"
              data-entity-uuid="#process"
              data-cgov-yaml-query-bundle="cgov_infographic"
              data-cgov-yaml-query-name="NCI Fact Book Infographic"
            ></drupal-entity>
            <p>
              Funds available to the NCI totaled $7.2 billion , post inter-departmental and intra-NIH transfers, including $50 million for the Childhood Cancer Data Initiative and $28 million for Childhood Cancer Survivorship, Treatment, Access, and Research (STAR) Act. This reflects an increase of 1.7% and $120 million from the previous fiscal year.
            </p>
            <p>
              Fiscal year highlights include:
            </p>
            <ul>
              <li>
                The Childhood Cancer Data Initiative (CCDI) will facilitate a connected data infrastructure and integrate multiple data sources to make data work better for patients, clinicians, and researchers.
              </li>
              <li>
                The Childhood Cancer Survivorship, Treatment, Access, and Research (STAR) Act, which was signed into law in June 2018, authorized funds for NCI to expand existing biorepositories for childhood cancer patients enrolled in NCI-sponsored clinical trials to collect and maintain relevant clinical, biological, and demographic information on children, adolescents, and young adults, and to continue to conduct and support pediatric cancer survivorship research.
              </li>
              <li>
                Of the total NCI budget obligated, 43.3% of the funds were allocated for Research Project Grants (RPGs).
              </li>
              <li>
                The total number of RPGs funded was 5,739 (including grants funded through the Small Business Innovation Research (SBIR) &amp; Small Business Technology Transfer (STTR) programs).
              </li>
              <li>
                Approximately one-fourth of the RPGs awarded were new (“Type 1”) or competing renewal (“Type 2” or “Type 4”) awards.
              </li>
              <li>
                There was a total of 1,224 competing RPGs funded (excluding grants funded through SBIR &amp; STTR). &nbsp;
              </li>
              <li>
                One-third of the total NCI budget supported ongoing, non-competing (“Type 5”) RPGs.
              </li>
              <li>
                The R01 grants were funded to the 10th percentile for Experienced and New Investigators and the Early-Stage Investigators were funded to the 17th percentile.
              </li>
              <li>
                R01 Early-Stage Investigators between the 1st and 10th percentiles were converted to R37 awards, giving them the opportunity to extend their research an additional 2 years.
              </li>
              <li>
                SBIR &amp; STTR awards funded 199 grants totaling $158.5 million.
              </li>
              <li>
                Intramural Research comprised 18.6% &nbsp;of the total NCI budget.
              </li>
            </ul>
            <p>
              The dollar amounts displayed in the NCI Budget Fact Book represent direct appropriated funds only, unless otherwise denoted.
            </p>
            <h3>
              <a href="/about-nci/budget/fact-book/data">NCI Budget Summary Data</a>
            </h3>
            <p>
              This section provides detailed data about funds available to NCI and information on how NCI obligated its funding.
            </p>
            <h3>
              <a href="/about-nci/budget/fact-book/extramural-programs">Extramural Programs</a>
            </h3>
            <p>
              NCI uses most of its budget to fund extramural grants and contracts. This section provides information about extramural funding by grant activity, institution, state, and country.
            </p>
            <h3>
              <a href="/about-nci/budget/fact-book/historical-trends">Historical Trends</a>
            </h3>
            <p>
              This section contains information about the history of NCI appropriations and the Professional Judgment (Bypass) Budget, as well as data on funding trends and staffing levels.
            </p>
            <h3>
              <a href="/about-nci/budget/fact-book/cancer-moonshot" data-entity-type="node" data-entity-uuid="8b71cc8d-0662-4741-8e45-450269ae303d" data-entity-substitution="canonical">Cancer Moonshot - Recent Fiscal Year Funding</a>
            </h3>
            <p>
              This section covers Cancer Moonshot, funded with $1.8 billion over 7 years through the 21st Century Cures Act, signed in December 2016.
            </p>
            <h2>
              About NCI Budget Fact Book&nbsp;
            </h2>
            <p>
              NCI's&nbsp;<a href="/node/867853" data-entity-type="node" data-entity-uuid="5b6312f5-1b41-4e83-b641-a04175f7e621" data-entity-substitution="canonical">Office of Budget and Finance</a>&nbsp;conducts financial analyses and develops financial data and information related to the NCI budget. Created with this data, the NCI Budget Fact Book is an annual report that provides a range of information and data from the previous fiscal year, from NCI program structure to research project grant numbers to extramural programs and historical trends.&nbsp;
            </p>
            <p>
              Email the Office of Budget and Finance at <a href="mailto:nciobfInquiries@mail.nih.gov ">nciobfInquiries@mail.nih.gov</a> with any questions about the NCI Budget Fact Book.
            </p>
            <h3>
              Previous NCI Budget Fact Books
            </h3>
            <p>
              <a href="/about-nci/budget/fact-book/archive" data-entity-type="node" data-entity-uuid="c3b546f4-9fb7-4244-94dd-3a1b29f93c8b" data-entity-substitution="canonical">Archives of NCI Budget Fact Books back to 1971 are available</a>.
            </p>
            <p>
              Information provided in previous NCI Budget Fact Books can now be found online.
            </p>
            <ul>
              <li>
                <a href="https://oma.od.nih.gov/IC_Organization_Chart/NCI%20Organizational%20Chart.pdf">NCI Organization Chart</a>
              </li>
              <li>
                <a href="/node/14304" data-entity-type="node" data-entity-uuid="c6bd69c7-cda2-42ed-8953-e1c6b530cb2e" data-entity-substitution="canonical">NCI Organization information</a>
              </li>
              <li>
                <a href="/node/923366" data-entity-type="node" data-entity-uuid="ed1cb076-5cd3-48c3-b6fe-b71c973289d8" data-entity-substitution="canonical">Cancer Statistics</a>
              </li>
            </ul>

