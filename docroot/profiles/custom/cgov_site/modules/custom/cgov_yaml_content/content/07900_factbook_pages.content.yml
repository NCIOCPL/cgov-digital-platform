  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              The NIH Management Fund provides the financing for certain common research and
              administrative support activities that are required in the operations of NIH:
            </p>
            <p>
              <strong>Clinical Center:</strong>&nbsp;Admissions and follow-up,
              anesthesiology, diagnostic x-ray, nuclear medicine, clinical pathology, blood
              bank, rehabilitation medicine, pharmacy, medical records, nursing services,
              patient nutrition services, housekeeping services, laundry, social work, drug
              costs, red team response, bench to bedside, and the children's hospital.
            </p>
            <p>
              <strong>Center for Scientific Review:</strong>&nbsp;Initial scientific review
              of applications and assignment of research grant applications to institutes.
            </p>
            <p>
              <strong>Center for Information Technology:</strong>&nbsp;Research and
              development program that applies concepts and methods of computer science are
              applied to biomedical problems.
            </p>
            <p>
              <strong>Other Research Services:</strong>&nbsp;Procurement, safety,
              engineering, biomedical engineering, veterinary resources, and library
              services have moved to Service and Supply fund.
            </p>
            <p>
              <strong>Service and Supply Fund:</strong>&nbsp;Mainframe computing, enterprise
              IT software planning and development, engineering planning and design,
              printing, telecommunications, procurement, shipping and receiving, motor pool,
              research animals, fabrication and maintenance of scientific equipment,
              utilities and plant maintenance, biomedical engineering, background
              investigations, IT cybersecurity, and General Services Administration (GSA)
              rental payments for space (including all building rental costs, utilities and
              guard services) and Other Research Services (to include procurement, safety,
              engineering and biomedical engineering).
