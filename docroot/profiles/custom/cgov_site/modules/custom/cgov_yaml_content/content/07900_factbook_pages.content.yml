    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_heading:
        value: 'Grant and Contract Awards by Country'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p><a class="usa-button" href="/about-nci/budget/fact-book/sample-download-data.xlsx">Download the Data</a></p>
            <p>
              NCI funds and co-funds cancer research all over the world. The table below
              lists number and dollar amount of grant and contract awards by country.
            </p>
