- entity: 'node'
  type: 'cgov_article'
  langcode: en
  status: 1
  moderation_state:
    value: 'published'
  title: 'Funding Allocated to Major NCI Program Areas'
  field_browser_title:
    value: '2021 NCI Budget Fact Book - Funding for NCI Program Areas'
  field_page_description:
    value: 'Displays the actual NCI obligations by program structure.'
  field_card_title:
    value: 'Program Structure'
  field_card_description:
    value: 'See obligations to major NCI program areas for the 2021 fiscal year.'
  field_site_section:
    - '#process':
        callback: 'reference'
        args:
          - 'taxonomy_term'
          - vid: 'cgov_site_sections'
            computed_path: '/about-nci/budget/fact-book/data/program-structure'
  field_public_use:
    value: 0
  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              Each fiscal year, NCI and other NIH Institutes and Centers report their
              obligations by mechanism. In addition to reporting by mechanism, reporting
              obligations by program structure is another way of showing how NCI obligates
              its funding each fiscal year.
            </p>
            <p>
              For the purposes of reporting by program structure, NCI programs are
              categorized by budget activity. These budget activities include:
            </p>
            <ul>
              <li>
                <strong>Research,</strong>&nbsp;categorized by the following research
                thrusts: Childhood Cancer Data Initiative (CCDI), cancer causation,
                detection and diagnosis, treatment, and cancer biology
              </li>
              <li>
                <strong>Resource Development:</strong>&nbsp;cancer centers, research
                manpower development, and buildings and facilities
              </li>
              <li>
                <strong>Cancer Prevention and Control</strong>
              </li>
              <li>
                <strong>Program Management and Support</strong>
              </li>
            </ul>
            <p>
              <a class="usa-button" href="/about-nci/budget/fact-book/sample-download-data.xlsx">Download the Data</a>
            </p>
            <drupal-entity
              data-caption=""
              data-embed-button="insert_content_block_content"
              data-entity-embed-display="view_mode:block_content.legacy_highchart"
              data-entity-type="block_content"
              data-entity-uuid="#process"
              data-cgov-yaml-query-type="raw_html_block"
              data-cgov-yaml-query-info="Factbook-program-structure"
            ></drupal-entity>

