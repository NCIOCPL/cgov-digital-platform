            </p>
            <p>
              The fiscal year 2023 funds available to NCI totaled $7.2 billion (including $216 million in Cures Act funding), reflecting an increase of 5.7%, or $387.5 million from the previous fiscal year. For more information on NCI's grant funding policy, visit the&nbsp;<a href="https://deainfo.nci.nih.gov/index.htm" rel="nofollow noopener" target="_blank">NCI Division of Extramural Affairs</a>&nbsp;website.
            </p>

