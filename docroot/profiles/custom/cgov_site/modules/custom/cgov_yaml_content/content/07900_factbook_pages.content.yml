  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              NCI reports how appropriated funds are spent based on their category or classification. These include funding for specific cancer sites, cancer types, diseases related to cancer, as well as types of NCI research mechanisms. The table below identifies funding levels for frequently requested areas of cancer research.&nbsp;
            </p>
            <p>
              The research areas in this table do not represent the entire NCI research portfolio. Moreover, funding for research areas often overlaps, and therefore the total for all research areas does not equal the total NCI budget. For example, funding for a clinical trial on breast cancer would be included in both the "Breast Cancer" and the "Clinical Trials" lines in the table below. Similarly, a basic cancer research project may be relevant to cervical, uterine, and ovarian cancers, and the relevant amounts would be included in the amounts for all three areas of cancer research. NCI provides estimated amounts based on initial budget data before final reconciliation is completed. After this analysis is done, the figures for years that often vary slightly from previously reported estimates are marked "Actual".&nbsp;
            </p>
            <p>
