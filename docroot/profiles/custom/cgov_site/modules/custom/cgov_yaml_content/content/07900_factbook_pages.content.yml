  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              In 1992, NCI established the Specialized Programs of Research Excellence (SPOREs). The Translational Research Program (TRP) is the home of the SPOREs, a cornerstone of NCI’s efforts to promote collaborative, interdisciplinary translational cancer research. SPORE grants involve both basic and clinical/applied scientists. They support projects that may result in new and diverse approaches to the prevention, early detection, diagnosis, and treatment of human cancers.&nbsp;
            </p>
            <p>
              Each SPORE focuses on a specific organ site, such as breast or lung cancer, or on a group of highly related cancers, such as gastrointestinal cancers. SPOREs enable the rapid and efficient movement of basic scientific findings into clinical settings and determine the biological basis for observations made in individuals with cancer or in populations at risk for cancer.
            </p>
            <p>
              For more information on organ sites, please visit the&nbsp;<a href="https://trp.cancer.gov/" rel="nofollow noopener" target="_blank">Translational Research Program</a>.
            </p>
            <p>
              The NCI Funded Research Portfolio (NFRP) web site contains additional information about the SPORE grants listed below that have been funded by NCI. The NFRP provides access to various NCI budget reports that contain information about research funding according to specific research categories.
            </p>
            <p>
              For more detailed information on these SPORE grants, visit the&nbsp;<a href="https://fundedresearch.cancer.gov/" rel="nofollow noopener" target="_blank">NCI Funded Research Portfolio (NFRP)</a>
            </p>
            <p>
