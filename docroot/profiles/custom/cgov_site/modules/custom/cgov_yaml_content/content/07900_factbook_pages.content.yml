  field_page_description:
    value: "See the funding amount and percent for the NCI portion of costs that are shared among all NIH Institutes and centers, and includes descriptions of each support activity."
  field_card_title:
    value: 'NIH Management Fund'
  field_card_description:
    value: "See the distribution of NCI's payment for common research and support activities required by NIH."
  field_site_section:
    - '#process':
        callback: 'reference'
        args:
          - 'taxonomy_term'
