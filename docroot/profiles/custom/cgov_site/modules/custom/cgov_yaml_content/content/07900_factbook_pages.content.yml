    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_heading:
        value: 'Professional Judgment Budget, President’s Budget, and Enacted Appropriations Comparison'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              This graph displays a historical view of the Professional Judgment Budget, the
              President's Budget, and the Enacted Appropriations for the NCI from fiscal
              years 1974 through 2026. The National Cancer Act gives the NCI Director
              special authority to submit an annual Professional Judgment Budget, sometimes
              referred to as the "Bypass Budget," directly to the President and Congress.
              This budget reflects NCI cancer research priorities and identifies areas of
              potential investment in cancer research. The President's Budget is an annual
              report prepared by the White House, in coordination with federal agencies. It
              proposes funding levels for the federal government, including for the NIH and
              NCI, according to the President's priorities. Congress reviews the
              Professional Judgment Budget and the President's Budget, and then conducts its
              own inquiries and hearings to develop and pass an appropriations bill to fund
              the government. When the bill is signed into law by the President, the Enacted
              Appropriation levels become available for NCI's cancer research activities.
            </p>

            <p><a class="usa-button" href="/about-nci/budget/fact-book/sample-download-data.xlsx">Download the Data</a></p>
