# cancer moonshot
- entity: 'node'
  type: 'cgov_article'
  langcode: en
  status: 1
  moderation_state:
    value: 'published'
  title: 'Cancer Moonshot℠ - Recent Fiscal Year Funding'
  field_browser_title:
    value: 'Cancer Moonshot Funding - Fiscal Year 2024'
  field_page_description:
    value: 'The 21st Century Cures Act authorized $1.8 billion to fund the Cancer Moonshot over a 7-year period. See appropriated funding by fiscal year for the Cancer Moonshot.'
  field_card_title:
    value: 'Cancer Moonshot℠ - Recent Fiscal Year Funding'
  field_card_description:
    value: 'The 21st Century Cures Act authorized $1.8 billion to fund the Cancer Moonshot over a 7-year period. See appropriated funding by fiscal year for the Cancer Moonshot.'
  field_site_section:
    - '#process':
        callback: 'reference'
        args:
          - 'taxonomy_term'
          - vid: 'cgov_site_sections'
            computed_path: '/about-nci/budget/fact-book/cancer-moonshot'
  field_public_use:
    value: 0
  field_intro_text:
    - format: "ncids_streamlined_no_headings"
      value: |
        <p>
          The 21st Century Cures Act, which was signed into law in December 2016, authorized $1.8 billion to fund the Cancer Moonshot over a 7 year period. The goal of the Cancer Moonshot is to accelerate progress in cancer, including prevention and screening, from cutting edge basic research to wider uptake of standard of care.
        </p>
        <p>
          More information on Cancer Moonshot can be found by visiting the <a href="/node/1299181" data-entity-type="node" data-entity-uuid="a974f312-68c0-4353-be8c-c0538946afa7" data-entity-substitution="canonical">NCI Cancer Moonshot<sup>SM</sup> Initiative page</a>.
        </p>
        <p>
          Information on recent funding opportunity announcements can be found on the <a href="/node/1299181" data-entity-type="node" data-entity-uuid="a974f312-68c0-4353-be8c-c0538946afa7" data-entity-substitution="canonical">NCI Cancer Moonshot<sup>SM</sup> Funding Opportunities page</a>.
        </p>
  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <div class="cgdp-embed-media-wrapper">
              <div class="embedded-entity cgdp-embed-summary-box cgdp-embed-summary-box--small align-right">
                <div class="usa-summary-box">
                  <div class="usa-summary-box__body">
                    <div class="usa-summary-box__heading">
