- entity: 'node'
  type: 'cgov_article'
  langcode: en
  status: 1
  moderation_state:
    value: 'published'
  title: 'Dr. Ruth L. Kirschstein National Research Service Awards (NRSA)'
  field_browser_title:
    value: '2021 NCI Budget Fact Book -  Dr. Ruth L. Kirschstein National Research Service Awards'
  field_page_description:
    value: 'The NCI Ruth L. Kirschstein National Research Service Award (NRSA) program helps ensure that a diverse pool of highly trained scientists is available to meet the Nation’s research needs. Learn more about the NRSA program and the types of predoc and postdoc trainees awarded.'
  field_card_title:
    value: 'Dr. Ruth L. Kirschstein National Research Service Awards'
  field_card_description:
    value: 'Learn about the program and the types of predoc and postdoc trainees awarded.'
  field_site_section:
    - '#process':
        callback: 'reference'
        args:
          - 'taxonomy_term'
          - vid: 'cgov_site_sections'
            computed_path: '/about-nci/budget/fact-book/extramural-programs/nrsa'
  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              This trainee award program is named after Dr. Ruth L. Kirschstein, a polio
              vaccine researcher and a champion of research training and inclusion of
              underrepresented individuals in the scientific workforce. Dr. Kirschstein was
              the first woman to become director of an NIH institute.
            </p>
            <p>
