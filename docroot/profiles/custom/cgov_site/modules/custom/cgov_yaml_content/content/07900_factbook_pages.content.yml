- entity: 'node'
  type: 'cgov_article'
  langcode: en
  status: 1
  moderation_state:
    value: 'published'
  title: 'Comparison of Dollars, Positions, and Space'
  field_browser_title:
    value: 'Comparison of Dollars, Positions & Space'
  field_page_description:
    value: "Find comparison of NCI's budget, full-time equivalent (FTE) positions, and occupied space from fiscal years 2010 through 2021."
  field_card_title:
    value: 'Comparison of Dollars, Positions & Space'
  field_card_description:
    value: ''
  field_site_section:
    - '#process':
        callback: 'reference'
        args:
          - 'taxonomy_term'
          - vid: 'cgov_site_sections'
            computed_path: '/about-nci/budget/fact-book/historical-trends/comparison'
  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              This page presents tables comparing NCI's budget, full-time equivalent (FTE)
              positions, and occupied space spanning fiscal years 2015 through 2024.
            </p>
            <p>
              NCI's budget is displayed in millions of dollars and includes the Cancer
              Moonshot℠ funding in fiscal years 2017 through 2023. FTEs are the number of
              work years for appointed employees of NCI. A work year equals 2,080 hours.
              Space is in thousands of square feet, excluding NCI's Frederick National
              Laboratory for Cancer Research.
            </p>
            <p>
              In fiscal year 2020, NCI acquired new laboratory space (called the
              Consolidated Research Lab) in Shady Grove and new administrative space in
              Bethesda.
            </p>

            <p><a class="usa-button" href="/about-nci/budget/fact-book/sample-download-data.xlsx">Download the Data</a></p>
