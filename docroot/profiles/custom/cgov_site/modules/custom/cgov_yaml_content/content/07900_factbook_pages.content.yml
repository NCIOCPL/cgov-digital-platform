  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              NCI has played a major role in HIV/AIDS research since the beginning of the
              AIDS epidemic. Scientists within NCI, as well as those supported by NCI, have
              made a number of key discoveries. HIV/AIDS research is conducted throughout
              the divisions and offices of NCI and is coordinated by the <a
                href="/node/1078650"
                data-entity-type="node"
                data-entity-uuid="eee30db4-156d-40b6-b618-0e4efc187a37"
                data-entity-substitution="canonical"
                target="_blank"
                >NCI Office of HIV and AIDS Malignancy</a
              >.&nbsp;
            </p>
            <p>
              In addition, because HIV/AIDS transcends every area of clinical medicine and
              basic scientific investigation, the NIH AIDS research effort involves every
              NIH Institute and Center. The NIH Office of AIDS Research has primary
              responsibility for planning and coordinating AIDS research across NIH.&nbsp;
            </p>

            <p><a class="usa-button" href="/about-nci/budget/fact-book/sample-download-data.xlsx">Download the Data</a></p>
