            <h2>
              Stamp Out Breast Cancer Act
            </h2>
            <p>
              The Stamp Out Breast Cancer Act (PL 105-41) was enacted in August 1997 and has since been extended to July 2000 (PL 106-253), November 2005 (PL 109-100), December 2007 (PL 110-150), December 2011 (PL 112-80), December 2015 (PL 114-99), and recently until December 2027 (PL 116-92). This act allows postal customers the opportunity to contribute funds to breast cancer research through their voluntary purchases of special rate postage stamps from the U.S. Postal Service (USPS). The act requires the USPS to transfer 70% of the funds collected (after postage costs and administrative costs) to the NIH and 30% to the Department of Defense. As of September 2024, NCI has received $67,594,833. NCI uses these funds for research projects directed towards breast cancer research. Thus far, several major programs have been funded, including the Insight Awards to Stamp Out Breast Cancer, the Breast Cancer Research Stamp Exceptional Opportunities Program, the Breast Cancer Premalignancy Program, a clinical trial to determine the risk of breast cancer recurrence, the Molecular and Cellular Characterization of Screen Detected Lesions Consortium, the Breast Cancer Weight Loss (BWEL), and the Tomosynthesis Mammographic Imaging Screening Trial (TMIST). In fiscal year 2024, $564,728 in stamp funds were obligated towards breast cancer research.
            </p>
