          value: |
            <p>
              To ensure the Cancer Moonshot goals and approaches were grounded in the best science, NCI convened a&nbsp;<a href="/node/1299181" data-entity-type="node" data-entity-uuid="a974f312-68c0-4353-be8c-c0538946afa7" data-entity-substitution="canonical" target="_blank">Blue Ribbon Panel of scientific experts</a>&nbsp;as a working group to the National Cancer Advisory Board. In September of 2016, the Blue Ribbon Panel presented a&nbsp;<a href="/node/1299181" data-entity-type="node" data-entity-uuid="a974f312-68c0-4353-be8c-c0538946afa7" data-entity-substitution="canonical" target="_blank">final report</a>&nbsp;outlining 10 research recommendations that represent areas that are well-positioned to accelerate progress in cancer prevention, diagnosis, treatment, and care.
            </p>
            <p>
              <a class="usa-button" href="/media/1183576" data-entity-type="media" data-entity-uuid="a1bc7b53-1342-442d-acd8-3ac5ff25b09b" data-entity-substitution="canonical">Download the Data</a>
