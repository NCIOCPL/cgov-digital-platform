                  <td style="text-align: center; width: 361px">&nbsp;</td>
                </tr>
              </tbody>
            </table>
            <ul>
              <li>
                The Professional Judgment Budget was not released in FY 2014, FY 2015, or in
                FY 2018. To learn more about this authority and view the budget archive,
                please visit NCI's
                <a
                  href="/node/1291246"
                  data-entity-type="node"
                  data-entity-uuid="a63c7056-403f-4e43-b6df-158c779992c0"
                  data-entity-substitution="canonical"
                  >About the Annual Plan</a
                >
                and
                <a href="https://www.cancer.gov/research/leading-progress"
                  >Budget Proposal page</a
                >.
              </li>
              <li>
                The FY 2017 and FY 2018 Enacted Appropriated budget includes $300,000,000 of
                Cancer Moonshot℠ funding. $400,000,000, $195,000,000, $195,000,000&nbsp;of
                Cancer Moonshot℠ funding are included in the FY 2019, FY 2020, and FY 2021
                Enacted Appropriated levels, respectively. The Professional Judgment Budget
                also includes $400,000,000, $195,000,000, $195,000,000, $194,000,000 and
                $216,000,000 of Cancer Moonshot funding in fiscal years 2019, 2020,
                2021,&nbsp;2022, and 2023, respectively. The FY 2024 President's Budget
                includes Moonshot funding as a part of NCI's base appropriation. The FY 2025
                President's Budget includes discretionary Moonshot funding as a part of
                NCI's base appropriation, but excludes mandatory Moonshot funding.
              </li>
              <li>
                The Enacted Appropriation levels do not include potential adjustments such
                as Rescissions, Sequestrations, Supplemental funding, or Secretary's
                Transfers that may have impacted the amount available for NCI expenditure.
              </li>
            </ul>
