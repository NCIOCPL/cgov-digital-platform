              data-entity-uuid="#process"
              data-cgov-yaml-query-type="raw_html_block"
              data-cgov-yaml-query-info="Factbook-obligations-mechanism"
            ></drupal-entity>
            <p>
              The mechanism "Other Research" includes the following grants: Career Programs
              (K Awards), Cancer Education, Clinical Cooperative Groups, Pre-Doc Post-Doc
              Transition Awards,&nbsp;Education Projects - Cooperative Agreements, Minority
              Biomedical Research Support, Research Pathway in Residency, Pilot Research
              Project, Resource Grants, International Research Training grants, Cooperative
              Conference Agreements, Conference grants, and Other Transaction Authority
              (OTA).
