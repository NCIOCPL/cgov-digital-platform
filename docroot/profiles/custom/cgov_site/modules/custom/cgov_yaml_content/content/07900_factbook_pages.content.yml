    value: 'published'
  title: 'Grant and Contract Awards'
  field_browser_title:
    value: '2021 NCI Budget Fact Book - Grants and Contract Awards'
  field_page_description:
    value: 'Find information about grant and contract awards by state, by country, and by institutions that received more than $15 million in support from NCI.'
  field_card_title:
    value: 'Grant and Contract Awards'
  field_card_description:
    value: 'See grant and contract awards by state, by country, and by institutions that received more than $15 million in support.'
  field_intro_text:
    - format: 'ncids_streamlined_no_headings'
      value: |
        <p>
          This page displays the number and dollar amount of grant and contract awards
          by state and country, with details for institutions receiving more than $15
          million in support from NCI.&nbsp;
        </p>
        <p>
          <strong>Grants</strong> are used when no substantial programmatic involvement
          is anticipated between NCI and the grant recipient during performance of the
          financially assisted activities. They are also used when there is no
          expectation on the part of NCI of a specified service or product for
          NCI.&nbsp;
        </p>
        <p>
          <strong>Contracts</strong> are used to procure cancer research services and
          other resources that the federal government needs to advance the NCI cancer
          research mission.&nbsp;
        </p>
        <p>
          Moving forward, all NCI obligations related to grants and contract awards will
          be included for each fiscal year. According to the National Institutes of
          Health’s Office of Extramural Research, the "Count Rules" and associated
          policy guidelines are updated annually, with funding limits determined by cost
          center and division. A value of “0” indicates an award that is funded by
          another NIH Institute but is co-funded by the NCI.
        </p>
  field_site_section:
    - '#process':
        callback: 'reference'
        args:
          - 'taxonomy_term'
          - vid: 'cgov_site_sections'
            computed_path: '/about-nci/budget/fact-book/extramural-programs/grant-contract-awards'
  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_heading:
        value: 'Grant and Contract Awards by State and Institution'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p><a class="usa-button" href="/about-nci/budget/fact-book/sample-download-data.xlsx">Download the Data</a></p>
            <p>
              In the map graphic below, grant and contract awards are presented by state.
              The table below the graphic provides information for U.S. territories. Within
              each state on the graphic, hover to view the total amount awarded and click to
              view detailed data on institutions that received more than $15 million in
              support from NCI during fiscal year 2024. For purposes of the NCI Budget Fact
              Book, institutions include universities, cancer centers, and hospitals.
            </p>

