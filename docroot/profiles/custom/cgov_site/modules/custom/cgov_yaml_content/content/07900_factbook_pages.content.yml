  title: 'Obligations by Budget Mechanism and Division'
  field_browser_title:
    value: '2021 NCI Budget Fact Book -  Obligations by Mechanism and Division'
  field_page_description:
    value: 'See obligations for grants, contracts, training fellowships, intramural research, and management and support, including the number of grant awards, funding amounts, and percent of the total NCI budget.'
  field_card_title:
    value: 'NCI and Division Obligations'
  field_card_description:
    value: 'See obligations for the 2021 fiscal year by budget mechanism and division.'
  field_intro_text:
    - format: 'ncids_streamlined_no_headings'
      value: |
        <p>All NIH Institutes and Centers report their actual obligations each fiscal year by budget mechanism. The tables below organize NCI funding by mechanism and division. The number of awards, trainees, or employees for each mechanism, as well as the dollar amount and percent share of the total NCI budget for each funding mechanism is also included.</p>
  field_site_section:
    - '#process':
        callback: 'reference'
        args:
          - 'taxonomy_term'
          - vid: 'cgov_site_sections'
            computed_path: '/about-nci/budget/fact-book/data/obligations'
  field_public_use:
    value: 0
  field_article_body:
    - entity: 'paragraph'
      type: 'body_section'
      field_body_section_heading:
        value: 'NCI Obligations by Mechanism'
      field_body_section_content:
        - format: 'ncids_full_html'
          value: |
            <p>
              <a class="usa-button" href="/about-nci/budget/fact-book/sample-download-data.xlsx">Download the Data</a>
            </p>
